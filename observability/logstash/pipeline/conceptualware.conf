# Concept #27 — ELK Stack: Logstash pipeline
# Input: structured JSON logs from Spring Boot / Node.js gateway
# Filter: parse JSON, add metadata, enrich with geo/service info
# Output: Elasticsearch index (searchable via Kibana)

input {
  # Accept log files shipped by Filebeat sidecar
  beats {
    port => 5044
  }

  # Accept JSON logs over TCP (direct from application)
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  # ── Parse structured JSON log lines (Spring Boot JSON pattern) ──────────────
  if [message] =~ /^\{/ {
    json {
      source => "message"
    }
  }

  # ── Normalize log level field name ─────────────────────────────────────────
  mutate {
    rename  => { "level"   => "log_level" }
    rename  => { "service" => "service_name" }
    add_tag => ["conceptualware"]
  }

  # ── Parse timestamp ────────────────────────────────────────────────────────
  date {
    match => ["timestamp", "yyyy-MM-dd'T'HH:mm:ss.SSSZ", "ISO8601"]
    target => "@timestamp"
    remove_field => ["timestamp"]
  }

  # ── Tag errors for alerting (Concept #27 — alertas e notificações) ─────────
  if [log_level] in ["ERROR", "FATAL"] {
    mutate { add_tag => ["alert-candidate"] }
  }

  # ── Extract trace context for correlation (Concept #27 — Trace ID) ─────────
  if [trace_id] {
    mutate {
      add_field => { "[@metadata][trace_id]" => "%{trace_id}" }
    }
  }
}

output {
  # ── Elasticsearch: index per day for retention management ─────────────────
  elasticsearch {
    hosts     => ["http://elasticsearch:9200"]
    index     => "conceptualware-logs-%{+YYYY.MM.dd}"
    action    => "index"
    doc_as_upsert => false
  }

  # ── Debug: also write to stdout (remove in production) ──────────────────
  # stdout { codec => rubydebug }
}
