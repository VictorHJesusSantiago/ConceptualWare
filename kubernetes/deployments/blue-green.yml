# Concept #22 — Blue-Green Deployment Strategy
#
# Blue-Green:
#   - Two identical production environments: Blue (current) and Green (new version)
#   - Traffic flows to Blue (100%)
#   - Deploy new version to Green, run tests
#   - Switch traffic to Green (100%) — instant cutover via service selector update
#   - Keep Blue running for instant rollback if issues arise
#   - Rollback: flip selector back to Blue
#
# Pros: zero downtime, instant rollback
# Cons: double resource cost during switch, database migrations must be backward-compatible
#
# Implementation: change Service selector label between blue/green
---
# BLUE deployment (current stable version)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-blue
  namespace: conceptualware
  labels:
    app: backend
    version: blue
    track: stable
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
      version: blue
  template:
    metadata:
      labels:
        app: backend
        version: blue
    spec:
      containers:
        - name: backend
          image: conceptualware/backend:v1.5.0    # stable version
          ports:
            - containerPort: 8080
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits:   { cpu: "1000m", memory: "1Gi" }
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 10

---
# GREEN deployment (new version being deployed)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-green
  namespace: conceptualware
  labels:
    app: backend
    version: green
    track: canary
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
      version: green
  template:
    metadata:
      labels:
        app: backend
        version: green
    spec:
      containers:
        - name: backend
          image: conceptualware/backend:v1.6.0    # new version
          ports:
            - containerPort: 8080
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits:   { cpu: "1000m", memory: "1Gi" }
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 10

---
# Production Service — points to BLUE (current)
# To switch to GREEN: kubectl patch service backend-service -p '{"spec":{"selector":{"version":"green"}}}'
# To rollback to BLUE: kubectl patch service backend-service -p '{"spec":{"selector":{"version":"blue"}}}'
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: conceptualware
  annotations:
    # Documents current active version
    deployment.io/active-version: "blue"
spec:
  selector:
    app: backend
    version: blue      # ← change this to "green" to switch traffic
  ports:
    - port: 8080
      targetPort: 8080

---
# Concept #22 — Canary Deployment
# Route a small percentage of traffic to new version to test in production.
# If metrics look good, gradually increase percentage.
#
# Approach: run N blue pods + M green pods, Service selects both via shared label.
# Traffic split ≈ M / (N + M) to green.
# Example: 9 blue + 1 green → 10% canary traffic
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-canary
  namespace: conceptualware
  labels:
    app: backend
    version: canary
spec:
  replicas: 1            # 1 canary + existing 9 stable = ~10% canary traffic
  selector:
    matchLabels:
      app: backend        # same selector as production service → gets 1/10 traffic
      version: canary
  template:
    metadata:
      labels:
        app: backend      # ← must match service selector
        version: canary
      annotations:
        # Alert on error rate increase for canary pods
        alert.io/error-threshold: "1%"
    spec:
      containers:
        - name: backend
          image: conceptualware/backend:v1.6.0-rc1
          ports:
            - containerPort: 8080
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits:   { cpu: "1000m", memory: "1Gi" }

---
# Concept #22 — Service Mesh (Istio) VirtualService for precise traffic splitting
# Requires: Istio installed in cluster
# This approach gives exact percentage control (better than replica-count approach)
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: backend-vs
  namespace: conceptualware
spec:
  hosts:
    - backend-service
  http:
    - route:
        - destination:
            host: backend-service
            subset: stable
          weight: 90         # 90% to stable
        - destination:
            host: backend-service
            subset: canary
          weight: 10         # 10% to canary

---
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: backend-dr
  namespace: conceptualware
spec:
  host: backend-service
  trafficPolicy:
    connectionPool:
      tcp: { maxConnections: 100 }
      http: { h2UpgradePolicy: UPGRADE }
    outlierDetection:
      consecutiveGatewayErrors: 5
      interval: 30s
      baseEjectionTime: 30s
  subsets:
    - name: stable
      labels:
        version: blue
    - name: canary
      labels:
        version: canary
