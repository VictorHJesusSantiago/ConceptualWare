# Concept #22 — Kubernetes: Secret
# Secrets store sensitive data (base64-encoded, NOT encrypted by default).
# For production: use Sealed Secrets, AWS Secrets Manager, or Vault agent injection.
#
# Generate base64: echo -n "mypassword" | base64
# Apply: kubectl apply -f secret.yml
# View: kubectl get secret conceptualware-secrets -o jsonpath='{.data.JWT_SECRET}' | base64 -d
#
# NOTE: These are PLACEHOLDER values — replace with real secrets in production.
# Never commit real secrets to git. Use: git-crypt, sops, or external secret store.
---
apiVersion: v1
kind: Secret
metadata:
  name: conceptualware-secrets
  namespace: conceptualware
  labels:
    app.kubernetes.io/part-of: conceptualware
  annotations:
    # Tells external-secrets operator where to fetch real values
    secret-manager: "aws-secrets-manager"
    secret-path: "conceptualware/prod"
type: Opaque
data:
  # echo -n "CHANGE_ME_USE_OPENSSL_RAND_BASE64_64" | base64
  JWT_SECRET: Q0hBTkdFX01FX1VTRV9PUEVOU1NMX1JBTkRfQkFTRTY0XzY0
  MONGO_ROOT_PASSWORD: Y2hhbmdlbWU=
  MONGO_URI: bW9uZ29kYjovL3Jvb3Q6Y2hhbmdlbWVAbW9uZ29kYi1zZXJ2aWNlOjI3MDE3L2NvbmNlcHR1YWx3YXJlP2F1dGhTb3VyY2U9YWRtaW4=
  NEO4J_AUTH: bmVvNGovcGFzc3dvcmQ=
  INFLUX_TOKEN: Q0hBTkdFX01FX0dFTkVSQVRFX1dJVEhfSU5GTFVYX0NMSA==
  SSL_KEYSTORE_PASSWORD: Y2hhbmdlbWU=
---
