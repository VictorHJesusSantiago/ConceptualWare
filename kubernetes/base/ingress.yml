# Concept #22 — Kubernetes: Ingress
#
# Ingress is an API object that manages external HTTP/HTTPS routing to Services.
# An IngressController (NGINX, Traefik, Envoy) watches Ingress resources and
# configures the reverse proxy accordingly.
#
# Features:
#   - TLS termination (HTTPS → HTTP internally)
#   - Path-based routing (/api → backend, /ws → websocket)
#   - Host-based routing (api.example.com → backend)
#   - Rate limiting (via annotations)
#   - Authentication (OAuth2 proxy annotations)
#   - CORS headers
#   - Canary routing (via weights — see canary-deployment.yml)
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: conceptualware-ingress
  namespace: conceptualware
  annotations:
    kubernetes.io/ingress.class: "nginx"

    # TLS: cert-manager auto-provisions Let's Encrypt certificates
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"

    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "20"

    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-Frame-Options "DENY" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
      add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline';" always;

    # CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://conceptualware.io"

    # Body size for algorithm input
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"

    # Timeouts
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"

spec:
  tls:
    - hosts:
        - conceptualware.io
        - api.conceptualware.io
      secretName: conceptualware-tls

  rules:
    # Frontend: all routes default to React SPA
    - host: conceptualware.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80

    # API Gateway: all /api/* requests
    - host: api.conceptualware.io
      http:
        paths:
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: gateway-service
                port:
                  number: 80

          # WebSocket endpoint (special handling required)
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8080

          # Health check bypass rate limiting
          - path: /health
            pathType: Exact
            backend:
              service:
                name: gateway-service
                port:
                  number: 80
