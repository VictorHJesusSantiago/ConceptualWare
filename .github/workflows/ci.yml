name: ConceptualWare CI/CD

on:
  push:
    branches: [main, develop, 'feature/**', 'hotfix/**']
  pull_request:
    branches: [main, develop]

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ── Lint & Static Analysis ──────────────────────────────────────────────────
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            gateway/package-lock.json
            frontend/package-lock.json

      - name: Lint Java (Checkstyle)
        working-directory: backend
        run: mvn checkstyle:check -q

      - name: Lint TypeScript Gateway
        working-directory: gateway
        run: npm ci && npm run lint

      - name: Lint Frontend
        working-directory: frontend
        run: npm ci && npm run lint

  # ── Backend Tests ────────────────────────────────────────────────────────────
  test-backend:
    name: Backend Tests (Java)
    runs-on: ubuntu-latest
    needs: lint
    services:
      mongodb:
        image: mongo:7.0
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: secret
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run Unit Tests
        working-directory: backend
        run: mvn test -Dspring.profiles.active=test

      - name: Run Integration Tests
        working-directory: backend
        env:
          SPRING_DATA_MONGODB_URI: mongodb://admin:secret@localhost:27017/conceptualware_test?authSource=admin
        run: mvn verify -Dspring.profiles.active=test -Pfailsafe

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/target/site/jacoco/

      - name: Coverage Gate (80% minimum)
        working-directory: backend
        run: mvn jacoco:check

  # ── Gateway Tests ────────────────────────────────────────────────────────────
  test-gateway:
    name: Gateway Tests (TypeScript)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: gateway/package-lock.json

      - name: Install & Test
        working-directory: gateway
        run: npm ci && npm test -- --coverage

  # ── Frontend Tests ────────────────────────────────────────────────────────────
  test-frontend:
    name: Frontend Tests (React)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Test
        working-directory: frontend
        run: npm ci && npm test -- --run

  # ── Security Scan ─────────────────────────────────────────────────────────────
  security:
    name: Security Scan (SAST/DAST)
    runs-on: ubuntu-latest
    needs: [test-backend, test-gateway, test-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: OWASP Dependency Check (Java)
        working-directory: backend
        run: mvn org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=7

      - name: npm audit (Gateway)
        working-directory: gateway
        run: npm audit --audit-level=high

      - name: npm audit (Frontend)
        working-directory: frontend
        run: npm audit --audit-level=high

  # ── Build & Publish ────────────────────────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: security
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend:${{ github.sha }}

      - name: Build Gateway Image
        uses: docker/build-push-action@v5
        with:
          context: ./gateway
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/gateway:${{ github.sha }}

      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:${{ github.sha }}

  # ── Deploy (Canary → Production) ──────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.29.0'

      - name: Configure Kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_BASE64 }}" | base64 -d > $HOME/.kube/config

      # ── Canary: 10% do tráfego ───────────────────────────────────────────────
      - name: Deploy Canary (10% traffic)
        run: |
          # Atualiza a imagem do canary para o SHA do commit atual
          kubectl -n conceptualware set image deployment/backend-canary \
            backend=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend:${{ github.sha }}
          kubectl -n conceptualware set image deployment/gateway-canary \
            gateway=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/gateway:${{ github.sha }}
          kubectl -n conceptualware set image deployment/frontend-canary \
            frontend=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:${{ github.sha }}

          # Aguarda rollout do canary
          kubectl -n conceptualware rollout status deployment/backend-canary  --timeout=120s
          kubectl -n conceptualware rollout status deployment/gateway-canary  --timeout=120s
          kubectl -n conceptualware rollout status deployment/frontend-canary --timeout=120s

      # ── Monitoramento do canary: verifica error rate por 5 min ───────────────
      - name: Monitor Canary (5 min error budget check)
        run: |
          END=$(($(date +%s) + 300))
          while [ $(date +%s) -lt $END ]; do
            # Consulta Prometheus para taxa de erros 5xx do canary
            ERROR_RATE=$(curl -sf \
              --data-urlencode 'query=sum(rate(http_server_requests_seconds_count{status=~"5..",deployment="canary"}[1m])) / sum(rate(http_server_requests_seconds_count{deployment="canary"}[1m]))' \
              "${{ secrets.PROMETHEUS_URL }}/api/v1/query" \
              | jq -r '.data.result[0].value[1] // "0"')

            echo "Canary error rate: ${ERROR_RATE}"

            # Aborta se error rate > 1%
            if (( $(echo "$ERROR_RATE > 0.01" | bc -l) )); then
              echo "ERROR: canary error rate ${ERROR_RATE} exceeded 1% threshold — rolling back"
              kubectl -n conceptualware rollout undo deployment/backend-canary
              kubectl -n conceptualware rollout undo deployment/gateway-canary
              kubectl -n conceptualware rollout undo deployment/frontend-canary
              exit 1
            fi

            sleep 30
          done
          echo "Canary healthy — promoting to production"

      # ── Promoção: atualiza o deployment estável ───────────────────────────────
      - name: Promote to Full Production
        run: |
          kubectl -n conceptualware set image deployment/backend \
            backend=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend:${{ github.sha }}
          kubectl -n conceptualware set image deployment/gateway \
            gateway=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/gateway:${{ github.sha }}
          kubectl -n conceptualware set image deployment/frontend \
            frontend=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:${{ github.sha }}

          kubectl -n conceptualware rollout status deployment/backend  --timeout=300s
          kubectl -n conceptualware rollout status deployment/gateway  --timeout=300s
          kubectl -n conceptualware rollout status deployment/frontend --timeout=300s

          echo "Deployment ${{ github.sha }} promoted to production"

      # ── Rollback automático em caso de falha ──────────────────────────────────
      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed — rolling back production to previous version"
          kubectl -n conceptualware rollout undo deployment/backend
          kubectl -n conceptualware rollout undo deployment/gateway
          kubectl -n conceptualware rollout undo deployment/frontend
          kubectl -n conceptualware rollout status deployment/backend  --timeout=120s
          kubectl -n conceptualware rollout status deployment/gateway  --timeout=120s
          kubectl -n conceptualware rollout status deployment/frontend --timeout=120s
