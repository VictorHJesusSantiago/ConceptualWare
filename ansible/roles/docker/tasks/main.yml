# Concept #22 — Ansible Role: docker
#
# Role: installs and configures Docker Engine on Debian/Ubuntu.
# Idempotent: safe to re-run — apt module checks if package is already present.
#
# Role directory structure:
#   roles/docker/
#     tasks/main.yml     ← this file
#     handlers/main.yml  ← restart docker on config change
#     defaults/main.yml  ← default variable values (lowest precedence)
#     templates/         ← Jinja2 templates (daemon.json.j2)
#     files/             ← static files (no templating needed)
#     meta/main.yml      ← role metadata, dependencies
---

# ── Prerequisites ──────────────────────────────────────────────────────────────

- name: Remove old Docker versions
  apt:
    name:
      - docker
      - docker-engine
      - docker.io
      - containerd
      - runc
    state: absent
  ignore_errors: yes   # OK if packages were never installed

- name: Install Docker prerequisites
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present

# ── Docker APT repository ──────────────────────────────────────────────────────

- name: Add Docker GPG key
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    keyring: /usr/share/keyrings/docker-archive-keyring.gpg
    state: present

- name: Add Docker APT repository
  apt_repository:
    repo: >-
      deb [arch=amd64 signed-by=/usr/share/keyrings/docker-archive-keyring.gpg]
      https://download.docker.com/linux/ubuntu
      {{ ansible_distribution_release }} stable
    state: present
    filename: docker

# ── Install Docker Engine ──────────────────────────────────────────────────────

- name: Install Docker Engine
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: yes
  notify: Restart Docker

# ── Docker daemon configuration ────────────────────────────────────────────────

- name: Configure Docker daemon
  template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    mode: "0644"
  notify: Restart Docker

# ── Docker service ─────────────────────────────────────────────────────────────

- name: Start and enable Docker service
  service:
    name: docker
    state: started
    enabled: yes

# ── Docker Compose plugin verification ────────────────────────────────────────

- name: Verify docker compose plugin
  command: docker compose version
  register: compose_version
  changed_when: false

- name: Display Docker Compose version
  debug:
    msg: "{{ compose_version.stdout }}"
