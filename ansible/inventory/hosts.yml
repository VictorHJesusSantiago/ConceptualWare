# Concept #22 — Ansible Inventory
#
# Inventory defines which hosts Ansible manages and how to connect to them.
# Formats: INI, YAML, or dynamic (scripts/plugins that query cloud APIs).
#
# Groups:
#   all            — implicit; every host belongs to this
#   app_servers    — hosts running docker-compose stack
#   load_balancers — NGINX LB tier (separate from app)
#   monitoring     — Prometheus / Grafana nodes
#
# Variables can be defined per-host, per-group, or in group_vars/ / host_vars/ directories.
# host_vars/<hostname>.yml overrides group_vars/<group>.yml (most specific wins).
#
# Dynamic inventory for AWS EC2:
#   ansible-inventory -i aws_ec2.yml --list
#   (requires amazon.aws collection: ansible-galaxy collection install amazon.aws)

all:
  vars:
    # SSH connection settings
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ~/.ssh/conceptualware-deploy.pem
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o ConnectTimeout=10"
    ansible_python_interpreter: /usr/bin/python3

  children:
    app_servers:
      vars:
        # Group-level vars (overridden by host_vars if needed)
        app_port: 8080
        deploy_strategy: rolling
      hosts:
        app-01.conceptualware.internal:
          ansible_host: 10.0.1.10
          availability_zone: us-east-1a
        app-02.conceptualware.internal:
          ansible_host: 10.0.1.11
          availability_zone: us-east-1b
        app-03.conceptualware.internal:
          ansible_host: 10.0.1.12
          availability_zone: us-east-1c

    load_balancers:
      vars:
        nginx_worker_processes: auto
        nginx_worker_connections: 1024
      hosts:
        lb-01.conceptualware.internal:
          ansible_host: 10.0.0.10
          availability_zone: us-east-1a
        lb-02.conceptualware.internal:
          ansible_host: 10.0.0.11
          availability_zone: us-east-1b

    monitoring:
      hosts:
        monitor-01.conceptualware.internal:
          ansible_host: 10.0.2.10
          prometheus_retention_days: 30
          grafana_admin_password: "{{ vault_grafana_password }}"
